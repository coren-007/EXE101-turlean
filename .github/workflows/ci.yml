# CI Pipeline — chạy tự động trên mọi PR và push lên main
# Hoàn toàn FREE cho public repo (unlimited minutes)
# Cho private repo: 2000 minutes/tháng free

name: 🧪 CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: file:./db/ci-test.db

      - name: ESLint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: file:./db/ci-test.db

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./db/ci-test.db
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.6.2
        if: github.ref == 'refs/heads/main'
        with:
          name: build-output
          path: |
            .next/standalone/
            .next/static/
          retention-days: 3
